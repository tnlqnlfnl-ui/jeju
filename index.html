<style>
  :root {
    --jeju-teal: #00a896;
    --jeju-sky: #48cae4;
    --jeju-sand: #f4e4c1;
    --jeju-green: #52b788;
    --jeju-dark: #1a2e2b;
    --jeju-orange: #f77f00;
    --bg: #f0f7f6;
    --card: #ffffff;
    --text: #1a2e2b;ㄹ
    --text-muted: #6b8f8a;
    --border: #d0e8e4;
    --tab-h: 64px;
    --header-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  /* HEADER */
  .header {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    height: var(--header-h);
    background: linear-gradient(135deg, var(--jeju-dark) 0%, #2d5a52 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-title { color: #fff; font-size: 17px; font-weight: 700; }
  .header-sub { color: #7ecdc4; font-size: 11px; margin-top: 1px; }
  .header-dday {
    background: var(--jeju-orange);
    color: #fff; font-weight: 900; font-size: 14px;
    padding: 4px 10px; border-radius: 20px;
  }
  /* CONTENT */
  .content {
    padding-top: calc(var(--header-h) + 8px);
    padding-bottom: calc(var(--tab-h) + 8px);
    min-height: 100vh;
  }
  /* BOTTOM TABS */
  .tabs {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    height: var(--tab-h);
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px; color: var(--text-muted);
    transition: color 0.2s;
    padding: 8px 4px;
  }
  .tab-btn.active { color: var(--jeju-teal); }
  .tab-btn .icon { font-size: 20px; }
  /* CARDS */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin: 0 12px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
  }
  .card-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  /* FLIGHT CARD */
  .flight-card {
    background: linear-gradient(135deg, var(--jeju-dark) 0%, #2d5a52 100%);
    border-radius: 16px;
    padding: 16px;
    margin: 8px 12px 12px;
    color: #fff;
  }
  .flight-row { display: flex; align-items: center; justify-content: space-between; }
  .flight-airport { text-align: center; }
  .flight-airport .code { font-size: 26px; font-weight: 900; font-family: 'Playfair Display', serif; }
  .flight-airport .name { font-size: 10px; color: #7ecdc4; margin-top: 2px; }
  .flight-time { font-size: 14px; font-weight: 700; margin-top: 4px; }
  .flight-arrow { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .flight-line { width: 80px; height: 1px; background: #7ecdc4; position: relative; }
  .flight-line::after { content:'✈'; position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-size:16px; }
  .flight-duration { font-size: 10px; color: #7ecdc4; }
  .flight-label { font-size: 10px; color: #7ecdc4; margin-bottom: 6px; font-weight: 700; letter-spacing: 1px; }
  /* DAY TABS */
  .day-tabs {
    display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
    background: #fff; border: 1.5px solid var(--border);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .day-tab.active {
    background: var(--jeju-teal); border-color: var(--jeju-teal);
    color: #fff; box-shadow: 0 2px 8px rgba(0,168,150,0.3);
  }
  /* SCHEDULE ITEMS */
  .schedule-item {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-time {
    font-size: 11px; color: var(--text-muted); font-weight: 600;
    min-width: 44px; padding-top: 2px;
  }
  .schedule-dot {
    width: 10px; height: 10px; border-radius: 50%;
    margin-top: 4px; flex-shrink: 0;
  }
  .schedule-body { flex: 1; }
  .schedule-name { font-size: 14px; font-weight: 700; }
  .schedule-memo { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .schedule-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 600;
  }
  .tag-main { background: #e8f7f5; color: var(--jeju-teal); }
  .tag-sub { background: #fff3e0; color: var(--jeju-orange); }
  .tag-sleep { background: #e8eaf6; color: #5c6bc0; }
  .tag-pending { background: #fce4ec; color: #e91e63; }
  /* TMAP BTN */
  .tmap-btn {
    display: flex; align-items: center; gap: 4px;
    background: #0068b7; color: #fff;
    border: none; border-radius: 8px;
    padding: 5px 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; margin-top: 6px;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none;
  }
  .tmap-btn:active { opacity: 0.8; }
  /* ACCOMMODATION */
  .accom-card {
    border-radius: 12px; padding: 12px;
    border: 2px solid var(--border);
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .accom-card.confirmed { border-color: var(--jeju-teal); background: #f0faf9; }
  .accom-card.candidate { border-color: var(--border); }
  .accom-name { font-size: 14px; font-weight: 700; }
  .accom-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .accom-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; margin-top: 6px;
  }
  .badge-confirmed { background: var(--jeju-teal); color: #fff; }
  .badge-candidate { background: #e0e0e0; color: #666; }
  /* AI CHAT */
  .chat-container {
    display: flex; flex-direction: column; height: calc(100vh - var(--header-h) - var(--tab-h));
    padding: 8px 0 0;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 0 12px 8px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-msg { max-width: 85%; }
  .chat-msg.user { align-self: flex-end; }
  .chat-msg.ai { align-self: flex-start; }
  .chat-bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 13px; line-height: 1.6; white-space: pre-wrap;
  }
  .chat-msg.user .chat-bubble { background: var(--jeju-teal); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.ai .chat-bubble { background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .chat-meta { font-size: 10px; color: var(--text-muted); margin-top: 3px; padding: 0 4px; }
  .chat-input-area {
    padding: 8px 12px;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .chat-location-btn {
    display: flex; align-items: center; gap: 6px;
    background: #e8f7f5; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    font-size: 11px; color: var(--jeju-teal); font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    align-self: flex-start;
  }
  .chat-row { display: flex; gap: 8px; }
  .chat-input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 24px;
    padding: 10px 16px; font-size: 13px; outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--jeju-teal); }
  .chat-send {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--jeju-teal); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    transition: transform 0.1s, opacity 0.2s;
  }
  .chat-send:active { transform: scale(0.9); }
  .chat-send:disabled { opacity: 0.5; }
  /* SETTINGS */
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 14px; font-weight: 600; }
  .settings-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .settings-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 13px; outline: none;
    font-family: 'Noto Sans KR', sans-serif; margin-top: 8px;
    transition: border-color 0.2s;
  }
  .settings-input:focus { border-color: var(--jeju-teal); }
  .btn-save {
    width: 100%; padding: 14px; background: var(--jeju-teal);
    color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; margin-top: 16px;
    transition: opacity 0.2s;
  }
  .btn-save:active { opacity: 0.8; }
  /* SECTION LABEL */
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 12px 12px 4px;
  }
  /* EDIT MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; display: flex; align-items: flex-end;
    justify-content: center;
  }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 20px 16px 32px; width: 100%; max-width: 480px;
    max-height: 70vh; overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; margin-top: 12px; }
  .modal-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 14px; outline: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .modal-input:focus { border-color: var(--jeju-teal); }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btn-cancel {
    flex: 1; padding: 12px; background: #f5f5f5;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .modal-btn-save {
    flex: 2; padding: 12px; background: var(--jeju-teal);
    color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  /* QUICK SUGGESTIONS */
  .suggestions { display: flex; gap: 6px; overflow-x: auto; padding: 0 12px 8px; scrollbar-width: none; }
  .suggestions::-webkit-scrollbar { display: none; }
  .suggestion-btn {
    flex-shrink: 0; background: #fff; border: 1px solid var(--border);
    border-radius: 16px; padding: 6px 12px; font-size: 11px; font-weight: 600;
    color: var(--text); cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .suggestion-btn:active { background: var(--bg); }
  /* LOADING */
  .typing { display: flex; gap: 4px; padding: 10px 14px; }
  .typing span {
    width: 7px; height: 7px; background: var(--jeju-teal); border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .overview-item { text-align: center; padding: 12px 8px; background: var(--bg); border-radius: 12px; }
  .overview-item .ov-num { font-size: 22px; font-weight: 900; color: var(--jeju-teal); }
  .overview-item .ov-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
  .wave-header {
    background: linear-gradient(135deg, var(--jeju-dark) 0%, #2d5a52 100%);
    padding: 16px 12px 24px;
    margin-bottom: -12px;
  }
  .wave-header h2 { color: #fff; font-size: 20px; font-weight: 900; }
  .wave-header p { color: #7ecdc4; font-size: 12px; margin-top: 4px; }
</style>
</head>

];

const TAG_COLORS = { "메인":"tag-main","서브":"tag-sub","숙소":"tag-sleep","미정":"tag-pending","키즈":"tag-main","비행기":"tag-sub","이동":"tag-sleep","카페":"tag-sub","자연":"tag-main" };

function getDday() {
  const target = new Date("2026-05-20");
  const now = new Date();
  const diff = Math.ceil((target - now) / (1000*60*60*24));
  if(diff > 0) return `D-${diff}`;
  if(diff === 0) return "D-DAY!";
  return `D+${Math.abs(diff)}`;
}

function openTmap(name, lat, lng) {
  const tmapAppUrl = `tmap://route?rGoalName=${encodeURIComponent(name)}&rGoaly=${lat}&rGoalx=${lng}`;
  const tmapWebUrl = `https://www.tmap.co.kr/tmap2/mobile/route.jsp?name=${encodeURIComponent(name)}&lat=${lat}&lon=${lng}`;
  const start = Date.now();
  window.location.href = tmapAppUrl;
  setTimeout(() => { if (Date.now() - start < 1500) window.open(tmapWebUrl, "_blank"); }, 1000);
}


// ─── COMPONENTS ──────────────────────────────────────────────────

function FlightCard({ dir, from, fromCode, to, toCode, dep, arr }) {
  return (
    <div className="flight-card">
      <div className="flight-label">{dir}</div>
      <div className="flight-row">
        <div className="flight-airport">
          <div className="code">{fromCode}</div>
          <div className="name">{from}</div>
          <div className="flight-time">{dep}</div>
        </div>
        <div className="flight-arrow">
          <div className="flight-line"></div>
          <div className="flight-duration">1h 05m</div>
        </div>
        <div className="flight-airport" style={{textAlign:'right'}}>
          <div className="code">{toCode}</div>
          <div className="name">{to}</div>
          <div className="flight-time">{arr}</div>
        </div>
      </div>
    </div>
  );
}

function ScheduleItem({ item, onEdit }) {
  return (
    <div className="schedule-item">
      <div className="schedule-time">{item.time}</div>
      <div className="schedule-dot" style={{background: item.color}}></div>
      <div className="schedule-body">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <div className="schedule-name">{item.name}</div>
          <button onClick={()=>onEdit(item)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'16px',padding:'0 0 0 8px',color:'#aaa'}}>✏️</button>
        </div>
        {item.memo && <div className="schedule-memo">{item.memo}</div>}
        <div className="schedule-tags">
          {item.tags.map(t=>(
            <span key={t} className={`tag ${TAG_COLORS[t]||'tag-main'}`}>{t}</span>
          ))}
        </div>
        {item.lat && (
          <button className="tmap-btn" onClick={()=>openTmap(item.name, item.lat, item.lng)}>
            🗺 티맵으로 안내
          </button>
        )}
      </div>
    </div>
  );
}

function EditModal({ item, onSave, onClose }) {
  const [name, setName] = useState(item.name);
  const [time, setTime] = useState(item.time);
  const [memo, setMemo] = useState(item.memo);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">일정 수정</div>
        <div className="modal-label">장소/일정명</div>
        <input className="modal-input" value={name} onChange={e=>setName(e.target.value)} />
        <div className="modal-label">시간</div>
        <input className="modal-input" value={time} onChange={e=>setTime(e.target.value)} />
        <div className="modal-label">메모</div>
        <input className="modal-input" value={memo} onChange={e=>setMemo(e.target.value)} placeholder="메모 입력..." />
        <div className="modal-btns">
          <button className="modal-btn-cancel" onClick={onClose}>취소</button>
          <button className="modal-btn-save" onClick={()=>onSave({...item, name, time, memo})}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");
  const [activeDay, setActiveDay] = useState("day0");
  const [schedule, setSchedule] = useState(() => {const saved = localStorage.getItem("jeju_schedule");
                                                  return saved ? JSON.parse(saved) : INITIAL_SCHEDULE;});
  const [accoms, setAccoms] = useState(ACCOMMODATIONS);
  const [editItem, setEditItem] = useState(null);
  const [messages, setMessages] = useState([
    { role:"ai", text:"안녕하세요! 제주 여행 AI 도우미예요 🌊\n맛집, 날씨, 관광지, 코스 추천 등 뭐든 물어보세요!\n위치 공유하면 주변 정보도 알려드려요." }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem("or_api_key")||"");
  const [apiKeyInput, setApiKeyInput] = useState(()=>localStorage.getItem("or_api_key")||"");
  const [location, setLocation] = useState(null);
  const chatEndRef = useRef(null);

  // --- 여기서부터 복사 ---
  // [데이터 자동 저장 로직]
  // schedule(일정) 데이터가 변경될 때마다 브라우저(localStorage)에 저장함
  useEffect(() => {
    localStorage.setItem("jeju_schedule", JSON.stringify(schedule));
    console.log("일정이 브라우저에 저장되었습니다.");
  }, [schedule]);

  // apiKey(API 키)가 변경될 때마다 브라우저에 저장함
  useEffect(() => {
    localStorage.setItem("or_api_key", apiKey);
  }, [apiKey]);
  // --- 여기까지 붙여넣기 ---

  useEffect(()=>{
    chatEndRef.current?.scrollIntoView({behavior:"smooth"});
  }, [messages, loading]);

  function confirmAccom(id) {
    setAccoms(prev => prev.map(a =>
      a.day.startsWith("2~3") ? {...a, type: a.id===id ? "confirmed":"candidate"} : a
    ));
  }

  function handleEditSave(updated) {
    setSchedule(prev => {
      const next = {...prev};
      for(const dk of Object.keys(next)) {
        next[dk] = {...next[dk], items: next[dk].items.map(i => i.id===updated.id ? updated : i)};
      }
      return next;
    });
    setEditItem(null);
  }

  function getLocation() {
    if(!navigator.geolocation) { alert("위치 접근 불가"); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        setLocation({lat: pos.coords.latitude, lng: pos.coords.longitude});
        alert(`📍 위치 가져옴: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}\nAI 질문 시 자동 포함됩니다.`);
      },
      () => alert("위치 권한을 허용해주세요.")
    );
  }

  async function sendMessage(text) {
    if(!text.trim()) return;
    if(!apiKey) { alert("설정 탭에서 OpenRouter API 키를 먼저 입력해주세요."); setTab("settings"); return; }
    const userMsg = { role:"user", text };
    setMessages(prev=>[...prev, userMsg]);
    setInput("");
    setLoading(true);
    const locationStr = location ? `\n현재 사용자 위치: 위도 ${location.lat.toFixed(4)}, 경도 ${location.lng.toFixed(4)} (제주도 내)` : "";
    const systemPrompt = `당신은 제주도 가족여행 전문 AI 도우미입니다. 한국어로 친절하고 간결하게 답변하세요.
여행 정보: 2026년 5월 20~23일, 창원 거주 가족, 어린 자녀 2명(32개월,12개월) 동반.
주요 일정: 에코랜드, 드르쿰다 목장카페, 공룡사파리, 자동차박물관/항공우주박물관, 뽀로로테마파크.
숙소: 서부/중부 제주 위주.${locationStr}
맛집, 관광지, 코스, 날씨, 아이 동반 팁 등을 전문적으로 안내해주세요. 답변은 핵심만 간결하게.`;
    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":`Bearer ${apiKey}`,
          "HTTP-Referer":"https://jeju-trip-app.local",
          "X-Title":"Jeju Family Trip"
        },
        body: JSON.stringify({
          model:"arcee-ai/trinity-large-preview:free",
          messages:[
            {role:"system", content: systemPrompt},
            ...messages.filter(m=>m.role!=="ai"||messages.indexOf(m)>0).map(m=>({role:m.role==="ai"?"assistant":"user", content:m.text})),
            {role:"user", content: text}
          ],
          max_tokens:600
        })
      });
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || "답변을 가져오지 못했어요. 다시 시도해주세요.";
      setMessages(prev=>[...prev, {role:"ai", text:reply}]);
    } catch(e) {
      setMessages(prev=>[...prev, {role:"ai", text:"오류가 발생했어요. API 키와 네트워크를 확인해주세요."}]);
    }
    setLoading(false);
  }

  function saveApiKey() {
    localStorage.setItem("or_api_key", apiKeyInput);
    setApiKey(apiKeyInput);
    alert("API 키가 저장되었습니다! ✅");
  }

  const SUGGESTIONS = [
    "4일차 서부제주 추천","에코랜드 꿀팁","아이 동반 맛집","뽀로로파크 주변 점심","제주 5월 날씨","렌터카 주의사항"
  ];

  return (
    <>
      <header className="header">
        <div>
          <div className="header-title">🌊 제주 가족여행</div>
          <div className="header-sub">2026.05.20 – 05.23 · 창원 출발</div>
        </div>
        <div className="header-dday">{getDday()}</div>
      </header>

      <main className="content">

        {/* ── HOME ── */}
        {tab==="home" && (
          <>
            <div className="wave-header">
              <h2>✈️ 제주도 3박4일</h2>
              <p>창원 가음꿈에그린 → 제주도 → 창원</p>
            </div>
            <div style={{height:20}}/>
            <div className="card">
              <div className="card-title">여행 요약</div>
              <div className="overview-grid">
                <div className="overview-item"><div className="ov-num">4</div><div className="ov-label">여행 일수</div></div>
                <div className="overview-item"><div className="ov-num">2</div><div className="ov-label">아이들</div></div>
                <div className="overview-item"><div className="ov-num">3</div><div className="ov-label">숙소 후보</div></div>
                <div className="overview-item"><div className="ov-num">6+</div><div className="ov-label">방문 장소</div></div>
              </div>
            </div>
            <FlightCard dir="🛫 가는 편" from="김해공항" fromCode="PUS" to="제주공항" toCode="CJU" dep="14:30" arr="15:35" />
            <FlightCard dir="🛬 오는 편" from="제주공항" fromCode="CJU" to="김해공항" toCode="PUS" dep="14:50" arr="15:55" />
            <div className="section-label">숙소 현황</div>
            <div className="card">
              {accoms.map(a=>(
                <div key={a.id} className={`accom-card ${a.type}`}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div>
                      <div className="accom-name">{a.name}</div>
                      <div className="accom-meta">{a.day}</div>
                      {a.memo && <div className="accom-meta">{a.memo}</div>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
                      <span className={`accom-badge ${a.type==="confirmed"?"badge-confirmed":"badge-candidate"}`}>
                        {a.type==="confirmed"?"✅ 확정":"후보"}
                      </span>
                      {a.type==="candidate" && (
                        <button onClick={()=>confirmAccom(a.id)} style={{background:'none',border:'1px solid var(--jeju-teal)',color:'var(--jeju-teal)',borderRadius:8,padding:'2px 8px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>확정</button>
                      )}
                    </div>
                  </div>
                  {a.lat && (
                    <button className="tmap-btn" style={{marginTop:8}} onClick={()=>openTmap(a.name, a.lat, a.lng)}>🗺 티맵 안내</button>
                  )}
                </div>
              ))}
            </div>
          </>
        )}

        {/* ── SCHEDULE ── */}
        {tab==="schedule" && (
          <>
            <div className="day-tabs">
              {Object.entries(schedule).map(([k,v])=>(
                <button key={k} className={`day-tab ${activeDay===k?"active":""}`} onClick={()=>setActiveDay(k)}>
                  {v.label}<br/><span style={{fontSize:10,fontWeight:400}}>{v.date}</span>
                </button>
              ))}
            </div>
            <div className="card">
              <div className="card-title">{schedule[activeDay].label} · {schedule[activeDay].date}</div>
              {schedule[activeDay].items.map(item=>(
                <ScheduleItem key={item.id} item={item} onEdit={setEditItem} />
              ))}
            </div>
            <div style={{padding:'0 12px'}}>
              <button
                style={{width:'100%',padding:'12px',background:'var(--bg)',border:'1.5px dashed var(--border)',borderRadius:12,fontSize:14,color:'var(--text-muted)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}
                onClick={()=>{
                  const name = prompt("추가할 일정명:");
                  if(!name) return;
                  const time = prompt("시간 (예: 10:00):");
                  const memo = prompt("메모 (선택):");
                  const newItem = {id:`new-${Date.now()}`, time:time||"미정", name, memo:memo||"", color:"#9e9e9e", tags:["추가"], lat:null, lng:null};
                  setSchedule(prev=>({...prev, [activeDay]:{...prev[activeDay], items:[...prev[activeDay].items, newItem]}}));
                }}>
                + 일정 추가
              </button>
            </div>
          </>
        )}

        {/* ── AI CHAT ── */}
        {tab==="ai" && (
          <div className="chat-container">
            <div className="suggestions">
              {SUGGESTIONS.map(s=>(
                <button key={s} className="suggestion-btn" onClick={()=>sendMessage(s)}>{s}</button>
              ))}
            </div>
            <div className="chat-messages">
              {messages.map((m,i)=>(
                <div key={i} className={`chat-msg ${m.role}`}>
                  <div className="chat-bubble">{m.text}</div>
                </div>
              ))}
              {loading && (
                <div className="chat-msg ai">
                  <div className="chat-bubble" style={{padding:0}}>
                    <div className="typing"><span/><span/><span/></div>
                  </div>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>
            <div className="chat-input-area">
              <button className="chat-location-btn" onClick={getLocation}>
                📍 {location ? `위치 공유됨 (${location.lat.toFixed(3)}, ${location.lng.toFixed(3)})` : "현재 위치 공유"}
              </button>
              <div className="chat-row">
                <input
                  className="chat-input"
                  value={input}
                  onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&!loading&&sendMessage(input)}
                  placeholder="맛집, 날씨, 코스 등 물어보세요..."
                />
                <button className="chat-send" onClick={()=>sendMessage(input)} disabled={loading||!input.trim()}>
                  {loading ? "⏳" : "➤"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── SETTINGS ── */}
        {tab==="settings" && (
          <div className="card" style={{margin:'12px 12px'}}>
            <div className="card-title">설정</div>
            <div className="settings-row">
              <div>
                <div className="settings-label">OpenRouter API 키</div>
                <div className="settings-sub">무료 AI 사용을 위해 필요해요</div>
                <input
                  className="settings-input"
                  type="password"
                  value={apiKeyInput}
                  onChange={e=>setApiKeyInput(e.target.value)}
                  placeholder="sk-or-v1-..."
                />
              </div>
            </div>
            <button className="btn-save" onClick={saveApiKey}>저장하기</button>
            <div style={{marginTop:20}}>
              <div className="settings-label" style={{fontSize:13,fontWeight:700,marginBottom:8}}>사용 가능한 무료 모델</div>
              {[
                {name:"google/gemini-2.0-flash-exp:free", desc:"추천 · 빠르고 한국어 우수"},
                {name:"meta-llama/llama-3.3-70b-instruct:free", desc:"성능 우수"},
                {name:"deepseek/deepseek-chat-v3-0324:free", desc:"한국어 무난"},
              ].map(m=>(
                <div key={m.name} style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--jeju-teal)'}}>{m.name}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>{m.desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}

      </main>

      {/* BOTTOM TABS */}
      <nav className="tabs">
        {[
          {id:"home", icon:"🏠", label:"홈"},
          {id:"schedule", icon:"📅", label:"일정"},
          {id:"ai", icon:"🤖", label:"AI"},
          {id:"settings", icon:"⚙️", label:"설정"},
        ].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
            <span className="icon">{t.icon}</span>{t.label}
          </button>
        ))}
      </nav>

      {editItem && <EditModal item={editItem} onSave={handleEditSave} onClose={()=>setEditItem(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
