<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="제주여행"/>
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/826/826070.png">
<title>🌊 제주 가족여행 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --jeju-teal: #00a896; --jeju-sky: #48cae4; --jeju-sand: #f4e4c1;
    --jeju-green: #52b788; --jeju-dark: #1a2e2b; --jeju-orange: #f77f00;
    --bg: #f0f7f6; --card: #ffffff; --text: #1a2e2b;
    --text-muted: #6b8f8a; --border: #d0e8e4; --tab-h: 70px; --header-h: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; max-width: 480px; margin: 0 auto; position: relative;
    padding-bottom: env(safe-area-inset-bottom);
  }
  /* UI 스타일 생략 (이전과 동일하거나 최적화됨) */
  .header { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: var(--header-h); background: linear-gradient(135deg, var(--jeju-dark) 0%, #2d5a52 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2); padding-top: env(safe-area-inset-top); }
  .header-title { color: #fff; font-size: 18px; font-weight: 700; }
  .header-dday { background: var(--jeju-orange); color: #fff; font-weight: 900; font-size: 13px; padding: 4px 12px; border-radius: 20px; }
  .content { padding-top: calc(var(--header-h) + 15px); padding-bottom: calc(var(--tab-h) + 30px); }
  .tabs { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: var(--tab-h); background: #fff; border-top: 1px solid var(--border); display: flex; z-index: 100; box-shadow: 0 -4px 16px rgba(0,0,0,0.08); padding-bottom: env(safe-area-inset-bottom); }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; font-size: 10px; color: var(--text-muted); }
  .tab-btn.active { color: var(--jeju-teal); font-weight: 700; }
  .card { background: var(--card); border-radius: 16px; padding: 16px; margin: 0 12px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border); }
  .tmap-btn { display: inline-flex; align-items: center; gap: 4px; background: #0068b7; color: #fff; border: none; border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; text-decoration: none; }
  .day-tabs { display: flex; gap: 8px; padding: 0 12px 12px; overflow-x: auto; scrollbar-width: none; }
  .day-tab { flex-shrink: 0; padding: 10px 18px; border-radius: 20px; background: #fff; border: 1.5px solid var(--border); font-size: 13px; font-weight: 600; color: var(--text-muted); }
  .day-tab.active { background: var(--jeju-teal); border-color: var(--jeju-teal); color: #fff; }
  .schedule-item { display: flex; gap: 12px; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: #fff; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; }
  .modal-input { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 12px; font-size: 15px; }
  .btn-save { width: 100%; padding: 16px; background: var(--jeju-teal); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// 초기 데이터 (데이터가 없을 때만 사용됨)
const DEFAULT_DATA = {
  day0: { label: "이동일", date: "5/20(화)", items: [
    { id:1, time:"14:30", name:"김해공항 출발", memo:"제주항공", lat:35.1796, lng:128.9381, tags:["비행기"] },
    { id:2, time:"15:35", name:"제주공항 도착", memo:"렌터카 수령", lat:33.5113, lng:126.4928, tags:["도착"] }
  ]},
  day1: { label: "Day 1", date: "5/21(수)", items: [
    { id:3, time:"오전", name:"에코랜드", memo:"기차 여행", lat:33.4772, lng:126.7373, tags:["메인"] }
  ]},
  day2: { label: "Day 2", date: "5/22(목)", items: [] },
  day3: { label: "Day 3", date: "5/23(금)", items: [] }
};

function openTmap(name, lat, lng) {
  const tmapAppUrl = `tmap://route?rGoalName=${encodeURIComponent(name)}&rGoaly=${lat}&rGoalx=${lng}`;
  const tmapWebUrl = `https://www.tmap.co.kr/tmap2/mobile/route.jsp?name=${encodeURIComponent(name)}&lat=${lat}&lon=${lng}`;
  const start = Date.now();
  window.location.href = tmapAppUrl;
  setTimeout(() => { if (Date.now() - start < 1500) window.open(tmapWebUrl, "_blank"); }, 1000);
}

function App() {
  const [tab, setTab] = useState("home");
  const [activeDay, setActiveDay] = useState("day0");
  const [schedule, setSchedule] = useState(() => {
    const saved = localStorage.getItem("jeju_schedule_2026");
    return saved ? JSON.parse(saved) : DEFAULT_DATA;
  });
  const [editItem, setEditItem] = useState(null);

  // 데이터가 변경될 때마다 로컬 스토리지에 자동 저장
  useEffect(() => {
    localStorage.setItem("jeju_schedule_2026", JSON.stringify(schedule));
  }, [schedule]);

  const handleUpdate = (updated) => {
    setSchedule(prev => {
      const next = {...prev};
      next[activeDay].items = next[activeDay].items.map(i => i.id === updated.id ? updated : i);
      return next;
    });
    setEditItem(null);
  };

  return (
    <>
      <header className="header">
        <div className="header-title">🌊 제주 가족여행</div>
        <div className="header-dday">D-DAY를 향해!</div>
      </header>

      <main className="content">
        {tab === "home" && (
          <div className="card">
            <h3>어서오세요! 🌴</h3>
            <p style={{fontSize:13, color:'#666', marginTop:8}}>일정 탭에서 계획을 확인하고 수정할 수 있습니다. 모든 수정사항은 휴대폰에 자동 저장됩니다.</p>
          </div>
        )}

        {tab === "schedule" && (
          <>
            <div className="day-tabs">
              {Object.keys(schedule).map(k => (
                <button key={k} className={`day-tab ${activeDay===k?"active":""}`} onClick={()=>setActiveDay(k)}>
                  {schedule[k].label}
                </button>
              ))}
            </div>
            <div className="card">
              {schedule[activeDay].items.length === 0 && <p style={{textAlign:'center', color:'#aaa', padding:'20px 0'}}>일정이 없습니다.</p>}
              {schedule[activeDay].items.map(item => (
                <div key={item.id} className="schedule-item">
                  <div style={{minWidth:50, fontSize:12, fontWeight:700, color:'var(--jeju-teal)'}}>{item.time}</div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex', justifyContent:'space-between'}}>
                      <strong style={{fontSize:15}}>{item.name}</strong>
                      <button onClick={()=>setEditItem(item)} style={{background:'none', border:'none', color:'#ccc'}}>✏️</button>
                    </div>
                    <div style={{fontSize:12, color:'#888', marginTop:4}}>{item.memo}</div>
                    {item.lat && <button className="tmap-btn" onClick={()=>openTmap(item.name, item.lat, item.lng)}>🗺 티맵 안내</button>}
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </main>

      <nav className="tabs">
        <button className={`tab-btn ${tab==='home'?'active':''}`} onClick={()=>setTab('home')}>🏠<span>홈</span></button>
        <button className={`tab-btn ${tab==='schedule'?'active':''}`} onClick={()=>setTab('schedule')}>📅<span>일정</span></button>
        <button className={`tab-btn ${tab==='settings'?'active':''}`} onClick={()=>setTab('settings')}>⚙️<span>설정</span></button>
      </nav>

      {editItem && (
        <div className="modal-overlay">
          <div className="modal">
            <h4 style={{marginBottom:15}}>일정 수정</h4>
            <input className="modal-input" value={editItem.name} onChange={e=>setEditItem({...editItem, name:e.target.value})} placeholder="장소명" />
            <input className="modal-input" value={editItem.time} onChange={e=>setEditItem({...editItem, time:e.target.value})} placeholder="시간" />
            <textarea className="modal-input" value={editItem.memo} onChange={e=>setEditItem({...editItem, memo:e.target.value})} placeholder="메모" style={{height:80}} />
            <button className="btn-save" onClick={()=>handleUpdate(editItem)}>저장하기</button>
            <button onClick={()=>setEditItem(null)} style={{width:'100%', background:'none', border:'none', marginTop:15, color:'#aaa'}}>닫기</button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
